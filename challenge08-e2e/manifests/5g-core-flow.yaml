---
# ── AMF Mock (orchestrates the full flow) ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: amf-e2e-config
  namespace: nf-e2e
data:
  server.js: |
    const http = require('http');
    const { randomUUID } = require('crypto');

    const SMF_URL = process.env.SMF_SERVICE_URL || 'http://smf.nf-e2e.svc.cluster.local:8080';
    const registrations = {};

    function respond(res, status, body) {
      res.writeHead(status, { 'Content-Type': 'application/json' });
      res.end(JSON.stringify(body, null, 2));
    }
    function parseBody(req) {
      return new Promise(r => {
        let d = '';
        req.on('data', c => d += c);
        req.on('end', () => { try { r(JSON.parse(d || '{}')); } catch { r({}); } });
      });
    }
    function callSmf(path, method, body) {
      return new Promise((resolve, reject) => {
        const url = new URL(SMF_URL + path);
        const data = body ? JSON.stringify(body) : null;
        const r = http.request({
          hostname: url.hostname, port: url.port || 8080,
          path: url.pathname, method,
          headers: { 'Content-Type': 'application/json' }
        }, resp => {
          let d = '';
          resp.on('data', c => d += c);
          resp.on('end', () => {
            try { resolve({ status: resp.statusCode, body: JSON.parse(d) }); }
            catch { resolve({ status: resp.statusCode, body: d }); }
          });
        });
        r.on('error', reject);
        if (data) r.write(data);
        r.end();
      });
    }

    const server = http.createServer(async (req, res) => {
      const url = req.url; const method = req.method;
      console.log(`[AMF] ${method} ${url}`);

      if (url === '/health')
        return respond(res, 200, { status:'UP', nf:'AMF', smfUrl: SMF_URL });

      // Full 5G registration + data session flow
      if (url === '/namf-comm/v1/ue-complete-registration' && method === 'POST') {
        const body = await parseBody(req);
        if (!body.supi) return respond(res, 400, { error: 'Missing supi' });

        const steps = [];
        const regId = randomUUID();

        // Step 1: AMF registers UE
        steps.push({ step: 1, action: 'AMF: UE Registration', supi: body.supi, regId, status: 'REGISTERED' });
        registrations[regId] = { supi: body.supi, regId };

        // Step 2: AMF triggers SMF for PDU session
        let smfResult;
        try {
          const smfResp = await callSmf('/nsmf-pdusession/v1/sm-contexts', 'POST', {
            supi: body.supi, dnn: body.dnn || 'internet'
          });
          smfResult = smfResp.body;
          steps.push({ step: 2, action: 'AMF → SMF: PDU Session Request', smContextRef: smfResult.smContextRef, status: 'CREATED' });
          steps.push({ step: 3, action: 'SMF → UPF: GTP-U Tunnel', ueIpv4: smfResult.upfTunnel?.ueIpv4, teid: smfResult.upfTunnel?.teid, status: 'ESTABLISHED' });
        } catch (e) {
          steps.push({ step: 2, action: 'AMF → SMF call FAILED', error: e.message });
        }

        return respond(res, 201, {
          scenario: '5G Core Registration + Data Session',
          flow: 'AMF → SMF → UPF',
          supi: body.supi,
          steps,
          smfSession: smfResult || null
        });
      }

      if (url === '/namf-comm/v1/ue-registrations' && method === 'GET')
        return respond(res, 200, Object.values(registrations));

      respond(res, 404, { error: `Not found: ${method} ${url}` });
    });
    server.listen(8080, () => {
      console.log('[AMF] AMF E2E Mock (AMF→SMF→UPF) on :8080');
      console.log(`[AMF] SMF endpoint: ${SMF_URL}`);
    });

