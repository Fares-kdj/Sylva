# ============================================================
#  SYLVA-LAB – Challenge 6: Networking Between 5G Functions
#  AMF + SMF mocks avec communication SBI inter-NF
# ============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: nf-network
  labels:
    sylva-challenge: "06"
    network-slice: default

---
# ── SMF Mock ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: smf-config
  namespace: nf-network
data:
  server.js: |
    const http = require('http');
    const { randomUUID } = require('crypto');

    const sessions = {};

    function respond(res, status, body) {
      res.writeHead(status, { 'Content-Type': 'application/json' });
      res.end(JSON.stringify(body, null, 2));
    }
    function parseBody(req) {
      return new Promise(r => {
        let d = '';
        req.on('data', c => d += c);
        req.on('end', () => { try { r(JSON.parse(d || '{}')); } catch { r({}); } });
      });
    }

    const server = http.createServer(async (req, res) => {
      const url = req.url; const method = req.method;
      console.log(`[SMF] ${method} ${url}`);

      if (url === '/health')
        return respond(res, 200, { status: 'UP', nf: 'SMF', version: '15.3.0' });

      if (url === '/nsmf-pdusession/v1/sm-contexts' && method === 'POST') {
        const body = await parseBody(req);
        if (!body.supi) return respond(res, 400, { error: 'Missing supi' });
        const id = randomUUID();
        const session = {
          smContextRef: id,
          supi: body.supi,
          pduSessionId: body.pduSessionId || 1,
          dnn: body.dnn || 'internet',
          pduSessionType: 'IPV4',
          sessionAmbr: { uplink: '100 Mbps', downlink: '100 Mbps' },
          allocatedEbiList: [{ ebi: 5, qosFlowId: 1 }],
          createdAt: new Date().toISOString(),
          upfEndpoint: 'upf.nf-network.svc.cluster.local:8880'
        };
        sessions[id] = session;
        console.log(`[SMF] PDU session created for ${body.supi}`);
        return respond(res, 201, session);
      }

      if (url === '/nsmf-pdusession/v1/sm-contexts' && method === 'GET')
        return respond(res, 200, Object.values(sessions));

      const ctxMatch = url.match(/^\/nsmf-pdusession\/v1\/sm-contexts\/([^/]+)$/);
      if (ctxMatch) {
        const s = sessions[ctxMatch[1]];
        if (!s) return respond(res, 404, { error: 'SM context not found' });
        if (method === 'GET')    return respond(res, 200, s);
        if (method === 'DELETE') {
          delete sessions[ctxMatch[1]];
          res.writeHead(204); return res.end();
        }
      }

      respond(res, 404, { error: `Not found: ${method} ${url}` });
    });
    server.listen(8080, () => console.log('[SMF] SMF Mock on :8080'));

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smf
  namespace: nf-network
  labels:
    app: smf
    nf-type: SMF
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smf
  template:
    metadata:
      labels:
        app: smf
        nf-type: SMF
    spec:
      nodeSelector:
        sylva-site: core
      containers:
        - name: smf
          image: node:18-alpine
          command: ["node", "/config/server.js"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: smf-config

---
apiVersion: v1
kind: Service
metadata:
  name: smf
  namespace: nf-network
  labels:
    app: smf
    nf-type: SMF
spec:
  selector:
    app: smf
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30102
  type: NodePort

---
# ── AMF Mock (with SMF call) ──────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: amf-network-config
  namespace: nf-network
data:
  server.js: |
    const http = require('http');
    const { randomUUID } = require('crypto');

    const SMF_URL = process.env.SMF_SERVICE_URL || 'http://smf.nf-network.svc.cluster.local:8080';
    const registrations = {};
    const sessions = {};

    function respond(res, status, body) {
      res.writeHead(status, { 'Content-Type': 'application/json' });
      res.end(JSON.stringify(body, null, 2));
    }
    function parseBody(req) {
      return new Promise(r => {
        let d = '';
        req.on('data', c => d += c);
        req.on('end', () => { try { r(JSON.parse(d || '{}')); } catch { r({}); } });
      });
    }
    function callSmf(path, method, body) {
      return new Promise((resolve, reject) => {
        const url = new URL(SMF_URL + path);
        const data = body ? JSON.stringify(body) : null;
        const opts = {
          hostname: url.hostname,
          port: url.port || 8080,
          path: url.pathname,
          method,
          headers: { 'Content-Type': 'application/json' }
        };
        const r = http.request(opts, resp => {
          let d = '';
          resp.on('data', c => d += c);
          resp.on('end', () => {
            try { resolve({ status: resp.statusCode, body: JSON.parse(d) }); }
            catch { resolve({ status: resp.statusCode, body: d }); }
          });
        });
        r.on('error', reject);
        if (data) r.write(data);
        r.end();
      });
    }

    const server = http.createServer(async (req, res) => {
      const url = req.url; const method = req.method;
      console.log(`[AMF] ${method} ${url}`);

      if (url === '/health')
        return respond(res, 200, { status: 'UP', nf: 'AMF', smfUrl: SMF_URL });

      if (url === '/namf-comm/v1/ue-registrations' && method === 'POST') {
        const body = await parseBody(req);
        if (!body.supi) return respond(res, 400, { error: 'Missing supi' });
        const id = randomUUID();
        registrations[id] = {
          registrationId: id, supi: body.supi,
          registrationStatus: 'REGISTERED',
          registrationTime: new Date().toISOString()
        };
        return respond(res, 201, registrations[id]);
      }

      // AMF triggers SMF to create a PDU session
      if (url === '/namf-comm/v1/pdu-sessions' && method === 'POST') {
        const body = await parseBody(req);
        if (!body.supi) return respond(res, 400, { error: 'Missing supi' });
        try {
          console.log(`[AMF] Calling SMF to create PDU session for ${body.supi}`);
          const smfResp = await callSmf('/nsmf-pdusession/v1/sm-contexts', 'POST', {
            supi: body.supi,
            pduSessionId: body.pduSessionId || 1,
            dnn: body.dnn || 'internet'
          });
          return respond(res, smfResp.status, {
            triggeredBy: 'AMF',
            smfResponse: smfResp.body,
            interNfCall: `AMF → SMF (${SMF_URL})`
          });
        } catch (e) {
          return respond(res, 503, { error: `SMF unreachable: ${e.message}` });
        }
      }

      if (url === '/namf-comm/v1/ue-registrations' && method === 'GET')
        return respond(res, 200, Object.values(registrations));

      respond(res, 404, { error: `Not found: ${method} ${url}` });
    });
    server.listen(8080, () => {
      console.log('[AMF] AMF Mock (with SMF integration) on :8080');
      console.log(`[AMF] SMF endpoint: ${SMF_URL}`);
    });

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amf
  namespace: nf-network
  labels:
    app: amf
    nf-type: AMF
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amf
  template:
    metadata:
      labels:
        app: amf
        nf-type: AMF
    spec:
      nodeSelector:
        sylva-site: core
      containers:
        - name: amf
          image: node:18-alpine
          command: ["node", "/config/server.js"]
          ports:
            - containerPort: 8080
          env:
            - name: SMF_SERVICE_URL
              value: "http://smf.nf-network.svc.cluster.local:8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: amf-network-config

---
apiVersion: v1
kind: Service
metadata:
  name: amf
  namespace: nf-network
  labels:
    app: amf
    nf-type: AMF
spec:
  selector:
    app: amf
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30101
  type: NodePort
